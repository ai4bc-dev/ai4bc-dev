<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900" font-family="Segoe UI, Arial, sans-serif">

  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#0d2444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3a6b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0078d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00b4d8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0078d4;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#0078d4;stop-opacity:0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="900" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="#4da6ff" stroke-width="0.5">
    <line x1="0" y1="100" x2="600" y2="100"/>
    <line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="0" y1="400" x2="600" y2="400"/>
    <line x1="0" y1="500" x2="600" y2="500"/>
    <line x1="0" y1="600" x2="600" y2="600"/>
    <line x1="0" y1="700" x2="600" y2="700"/>
    <line x1="0" y1="800" x2="600" y2="800"/>
    <line x1="100" y1="0" x2="100" y2="900"/>
    <line x1="200" y1="0" x2="200" y2="900"/>
    <line x1="300" y1="0" x2="300" y2="900"/>
    <line x1="400" y1="0" x2="400" y2="900"/>
    <line x1="500" y1="0" x2="500" y2="900"/>
  </g>

  <!-- Accent glow circle top-right -->
  <circle cx="520" cy="180" r="200" fill="url(#glowGrad)" opacity="0.6"/>
  <circle cx="520" cy="180" r="120" fill="#0078d4" opacity="0.06"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="600" height="6" fill="url(#accentGrad)"/>

  <!-- BC + AI icon area -->
  <!-- Outer ring -->
  <circle cx="300" cy="280" r="120" fill="none" stroke="#0078d4" stroke-width="1.5" opacity="0.4"/>
  <circle cx="300" cy="280" r="100" fill="none" stroke="#0078d4" stroke-width="0.8" opacity="0.25"/>

  <!-- Central hexagon (BC symbol) -->
  <polygon points="300,180 387,230 387,330 300,380 213,330 213,230"
           fill="#0d2444" stroke="#0078d4" stroke-width="2" opacity="0.9"/>
  <polygon points="300,200 370,242 370,318 300,360 230,318 230,242"
           fill="#0a1628" stroke="#00b4d8" stroke-width="1" opacity="0.6"/>

  <!-- BC text in hexagon -->
  <text x="300" y="268" text-anchor="middle" font-size="42" font-weight="bold" fill="#0078d4" filter="url(#glow)" letter-spacing="-1">BC</text>
  <text x="300" y="308" text-anchor="middle" font-size="16" fill="#00b4d8" letter-spacing="6">+ AI</text>

  <!-- Orbit dots -->
  <circle cx="420" cy="280" r="6" fill="#0078d4" opacity="0.8"/>
  <circle cx="180" cy="280" r="6" fill="#0078d4" opacity="0.8"/>
  <circle cx="300" cy="160" r="5" fill="#00b4d8" opacity="0.7"/>
  <circle cx="300" cy="400" r="5" fill="#00b4d8" opacity="0.7"/>
  <circle cx="396" cy="210" r="4" fill="#4da6ff" opacity="0.6"/>
  <circle cx="204" cy="350" r="4" fill="#4da6ff" opacity="0.6"/>

  <!-- Connecting lines from orbit -->
  <line x1="300" y1="160" x2="387" y2="210" stroke="#0078d4" stroke-width="0.8" opacity="0.3"/>
  <line x1="300" y1="400" x2="213" y2="350" stroke="#0078d4" stroke-width="0.8" opacity="0.3"/>

  <!-- Main title -->
  <text x="300" y="470" text-anchor="middle" font-size="38" font-weight="bold" fill="white" letter-spacing="-0.5">AI pro BC vývojáře</text>

  <!-- Subtitle -->
  <rect x="60" y="490" width="480" height="2" fill="url(#accentGrad)" opacity="0.8"/>
  <text x="300" y="524" text-anchor="middle" font-size="16" fill="#a0c4ff" letter-spacing="0.5">Průvodce využitím umělé inteligence</text>
  <text x="300" y="548" text-anchor="middle" font-size="16" fill="#a0c4ff" letter-spacing="0.5">v Business Central ekosystému</text>
  <rect x="60" y="566" width="480" height="1" fill="#0078d4" opacity="0.4"/>

  <!-- Chapter pills -->
  <rect x="70" y="590" width="140" height="28" rx="14" fill="#0078d4" opacity="0.2" stroke="#0078d4" stroke-width="1"/>
  <text x="140" y="609" text-anchor="middle" font-size="11" fill="#a0c4ff">Prompt Engineering</text>

  <rect x="225" y="590" width="150" height="28" rx="14" fill="#00b4d8" opacity="0.15" stroke="#00b4d8" stroke-width="1"/>
  <text x="300" y="609" text-anchor="middle" font-size="11" fill="#a0c4ff">Azure OpenAI + AL</text>

  <rect x="390" y="590" width="140" height="28" rx="14" fill="#4da6ff" opacity="0.15" stroke="#4da6ff" stroke-width="1"/>
  <text x="460" y="609" text-anchor="middle" font-size="11" fill="#a0c4ff">RAG &amp; AI Agenti</text>

  <rect x="100" y="630" width="150" height="28" rx="14" fill="#0078d4" opacity="0.15" stroke="#0078d4" stroke-width="1"/>
  <text x="175" y="649" text-anchor="middle" font-size="11" fill="#a0c4ff">GitHub Copilot</text>

  <rect x="268" y="630" width="160" height="28" rx="14" fill="#00b4d8" opacity="0.15" stroke="#00b4d8" stroke-width="1"/>
  <text x="348" y="649" text-anchor="middle" font-size="11" fill="#a0c4ff">Power Platform AI</text>

  <!-- Author area -->
  <rect x="0" y="780" width="600" height="120" fill="#060e1c" opacity="0.7"/>
  <rect x="0" y="780" width="600" height="2" fill="url(#accentGrad)" opacity="0.5"/>

  <text x="300" y="822" text-anchor="middle" font-size="13" fill="#666" letter-spacing="2">AUTOR</text>
  <text x="300" y="850" text-anchor="middle" font-size="20" font-weight="bold" fill="white">Miloš Mikulášek</text>
  <text x="300" y="872" text-anchor="middle" font-size="12" fill="#4da6ff">ai4bc.dev</text>

  <!-- Edition badge -->
  <rect x="460" y="798" width="110" height="46" rx="6" fill="#0078d4" opacity="0.15" stroke="#0078d4" stroke-width="1"/>
  <text x="515" y="818" text-anchor="middle" font-size="10" fill="#a0c4ff">Vydání</text>
  <text x="515" y="836" text-anchor="middle" font-size="16" font-weight="bold" fill="#0078d4">2026</text>

  <!-- Bottom accent -->
  <rect x="0" y="894" width="600" height="6" fill="url(#accentGrad)"/>
</svg>
