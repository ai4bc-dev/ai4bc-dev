<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Segoe UI, Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="560" fill="#f8f9fa" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">AI Ekosystém v Business Central</text>
  <text x="450" y="58" text-anchor="middle" font-size="12" fill="#666">Přehled integračních bodů a nástrojů</text>

  <!-- Center: BC Core -->
  <ellipse cx="450" cy="300" rx="95" ry="75" fill="#0052cc" opacity="0.9"/>
  <text x="450" y="293" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Business</text>
  <text x="450" y="311" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Central</text>
  <text x="450" y="329" text-anchor="middle" font-size="10" fill="#c8d8ff">v27+</text>

  <!-- Top: Microsoft Copilot -->
  <rect x="310" y="90" width="280" height="90" rx="10" fill="#0078d4" opacity="0.9"/>
  <text x="450" y="120" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Microsoft Copilot v BC</text>
  <text x="450" y="140" text-anchor="middle" font-size="10" fill="#cce4ff">Marketing text · Bank reconciliation</text>
  <text x="450" y="156" text-anchor="middle" font-size="10" fill="#cce4ff">Sales suggestions · Chat · Sustainability</text>
  <!-- Arrow down -->
  <line x1="450" y1="180" x2="450" y2="225" stroke="#0078d4" stroke-width="2.5" marker-end="url(#arrow-blue)"/>

  <!-- Left: Azure OpenAI -->
  <rect x="60" y="235" width="220" height="90" rx="10" fill="#107c10" opacity="0.9"/>
  <text x="170" y="265" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Azure OpenAI</text>
  <text x="170" y="283" text-anchor="middle" font-size="10" fill="#c8e8c8">GPT-4o · GPT-4o-mini</text>
  <text x="170" y="299" text-anchor="middle" font-size="10" fill="#c8e8c8">text-embedding-3-small</text>
  <text x="170" y="315" text-anchor="middle" font-size="10" fill="#c8e8c8">AL HttpClient → API volání</text>
  <!-- Arrow right -->
  <line x1="280" y1="280" x2="355" y2="280" stroke="#107c10" stroke-width="2.5" marker-end="url(#arrow-green)"/>

  <!-- Right: Power Platform -->
  <rect x="620" y="235" width="220" height="90" rx="10" fill="#742774" opacity="0.9"/>
  <text x="730" y="265" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Power Platform</text>
  <text x="730" y="283" text-anchor="middle" font-size="10" fill="#e8c8e8">AI Builder · Copilot Studio</text>
  <text x="730" y="299" text-anchor="middle" font-size="10" fill="#e8c8e8">Power Automate Flows</text>
  <text x="730" y="315" text-anchor="middle" font-size="10" fill="#e8c8e8">Custom Connectors</text>
  <!-- Arrow left -->
  <line x1="620" y1="280" x2="545" y2="280" stroke="#742774" stroke-width="2.5" marker-end="url(#arrow-purple)"/>

  <!-- Bottom-left: AI Dev Tools -->
  <rect x="80" y="410" width="220" height="90" rx="10" fill="#d83b01" opacity="0.9"/>
  <text x="190" y="440" text-anchor="middle" font-size="13" font-weight="bold" fill="white">AI Dev Nástroje</text>
  <text x="190" y="458" text-anchor="middle" font-size="10" fill="#ffe0d0">Claude Code · GitHub Copilot</text>
  <text x="190" y="474" text-anchor="middle" font-size="10" fill="#ffe0d0">Cursor · Windsurf</text>
  <text x="190" y="490" text-anchor="middle" font-size="10" fill="#ffe0d0">Asistence při psaní AL kódu</text>
  <!-- Arrow up-right -->
  <line x1="300" y1="440" x2="390" y2="370" stroke="#d83b01" stroke-width="2.5" marker-end="url(#arrow-orange)"/>

  <!-- Bottom-right: MCP / Advanced -->
  <rect x="600" y="410" width="220" height="90" rx="10" fill="#005a9e" opacity="0.9"/>
  <text x="710" y="440" text-anchor="middle" font-size="13" font-weight="bold" fill="white">MCP &amp; Agenti</text>
  <text x="710" y="458" text-anchor="middle" font-size="10" fill="#c8d8ff">Model Context Protocol</text>
  <text x="710" y="474" text-anchor="middle" font-size="10" fill="#c8d8ff">RAG · AI Agenti</text>
  <text x="710" y="490" text-anchor="middle" font-size="10" fill="#c8d8ff">BC jako MCP server</text>
  <!-- Arrow up-left -->
  <line x1="600" y1="440" x2="510" y2="370" stroke="#005a9e" stroke-width="2.5" marker-end="url(#arrow-darkblue)"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0078d4"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#107c10"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#742774"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#d83b01"/>
    </marker>
    <marker id="arrow-darkblue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#005a9e"/>
    </marker>
  </defs>

  <!-- Legend -->
  <rect x="20" y="520" width="860" height="28" rx="5" fill="#e8edf2"/>
  <text x="450" y="538" text-anchor="middle" font-size="11" fill="#444">Všechny integrační body spolupracují — od vestavěného Copilota přes vlastní Azure OpenAI volání až po MCP servery</text>
</svg>
