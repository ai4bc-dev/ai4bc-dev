<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 340" font-family="Segoe UI, Arial, sans-serif">
  <rect width="860" height="340" fill="#f8f9fa" rx="12"/>

  <!-- Title -->
  <text x="430" y="34" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">Volání Azure OpenAI API z AL kódu</text>
  <text x="430" y="52" text-anchor="middle" font-size="11" fill="#666">Sekvenční diagram integrace</text>

  <!-- Actors -->
  <!-- BC User -->
  <rect x="30" y="75" width="100" height="40" rx="8" fill="#0052cc"/>
  <text x="80" y="100" text-anchor="middle" font-size="11" font-weight="bold" fill="white">BC Uživatel</text>
  <line x1="80" y1="115" x2="80" y2="310" stroke="#0052cc" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- AL Codeunit -->
  <rect x="185" y="75" width="120" height="40" rx="8" fill="#5c6bc0"/>
  <text x="245" y="95" text-anchor="middle" font-size="11" font-weight="bold" fill="white">AL Codeunit</text>
  <text x="245" y="109" text-anchor="middle" font-size="9" fill="#e0e0ff">OpenAI Helper</text>
  <line x1="245" y1="115" x2="245" y2="310" stroke="#5c6bc0" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- HttpClient -->
  <rect x="370" y="75" width="120" height="40" rx="8" fill="#00695c"/>
  <text x="430" y="95" text-anchor="middle" font-size="11" font-weight="bold" fill="white">HttpClient</text>
  <text x="430" y="109" text-anchor="middle" font-size="9" fill="#c8ede8">AL built-in</text>
  <line x1="430" y1="115" x2="430" y2="310" stroke="#00695c" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Azure OpenAI -->
  <rect x="555" y="75" width="140" height="40" rx="8" fill="#0078d4"/>
  <text x="625" y="95" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Azure OpenAI</text>
  <text x="625" y="109" text-anchor="middle" font-size="9" fill="#cce4ff">Chat Completions API</text>
  <line x1="625" y1="115" x2="625" y2="310" stroke="#0078d4" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Sequence arrows -->
  <!-- 1: User triggers -->
  <line x1="80" y1="140" x2="240" y2="140" stroke="#333" stroke-width="1.5" marker-end="url(#seqarr)"/>
  <text x="160" y="133" text-anchor="middle" font-size="10" fill="#333">1. Akce (uživatel)</text>

  <!-- 2: Build JSON body -->
  <rect x="210" y="150" width="70" height="18" rx="3" fill="#e8edf2"/>
  <text x="245" y="163" text-anchor="middle" font-size="9" fill="#333">sestaví JSON body</text>

  <!-- 3: AL → HttpClient -->
  <line x1="245" y1="178" x2="425" y2="178" stroke="#333" stroke-width="1.5" marker-end="url(#seqarr)"/>
  <text x="335" y="171" text-anchor="middle" font-size="10" fill="#333">2. HttpRequestMessage</text>

  <!-- 4: HttpClient → Azure -->
  <line x1="430" y1="200" x2="620" y2="200" stroke="#333" stroke-width="1.5" marker-end="url(#seqarr)"/>
  <text x="525" y="193" text-anchor="middle" font-size="10" fill="#333">3. POST /chat/completions</text>
  <text x="525" y="207" text-anchor="middle" font-size="9" fill="#666">api-key header + JSON</text>

  <!-- 5: Azure processes -->
  <rect x="590" y="218" width="70" height="18" rx="3" fill="#e8edf2"/>
  <text x="625" y="231" text-anchor="middle" font-size="9" fill="#333">GPT-4o inference</text>

  <!-- 6: Azure → HttpClient response -->
  <line x1="620" y1="248" x2="435" y2="248" stroke="#0078d4" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#seqarr-blue)"/>
  <text x="525" y="241" text-anchor="middle" font-size="10" fill="#0078d4">4. HTTP 200 + JSON</text>

  <!-- 7: HttpClient → AL -->
  <line x1="425" y1="268" x2="250" y2="268" stroke="#00695c" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#seqarr-green)"/>
  <text x="337" y="261" text-anchor="middle" font-size="10" fill="#00695c">5. ResponseMsg.Content</text>

  <!-- 8: AL parses -->
  <rect x="210" y="278" width="70" height="18" rx="3" fill="#e8edf2"/>
  <text x="245" y="291" text-anchor="middle" font-size="9" fill="#333">parsuje choices[0]</text>

  <!-- 9: AL → User -->
  <line x1="240" y1="300" x2="85" y2="300" stroke="#5c6bc0" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#seqarr-purple)"/>
  <text x="162" y="293" text-anchor="middle" font-size="10" fill="#5c6bc0">6. Text odpovědi AI</text>

  <!-- Markers -->
  <defs>
    <marker id="seqarr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#333"/>
    </marker>
    <marker id="seqarr-blue" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#0078d4"/>
    </marker>
    <marker id="seqarr-green" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#00695c"/>
    </marker>
    <marker id="seqarr-purple" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#5c6bc0"/>
    </marker>
  </defs>
</svg>
