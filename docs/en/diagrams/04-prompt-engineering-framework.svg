<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 480" font-family="Segoe UI, Arial, sans-serif">
  <rect width="860" height="480" fill="#f8f9fa" rx="12"/>

  <!-- Title -->
  <text x="430" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">5 Rules of Prompt Engineering for BC</text>
  <text x="430" y="54" text-anchor="middle" font-size="11" fill="#666">Framework for Effective AI Communication</text>

  <!-- Central hub -->
  <circle cx="430" cy="265" r="60" fill="#0052cc" opacity="0.95"/>
  <text x="430" y="257" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Effective</text>
  <text x="430" y="273" text-anchor="middle" font-size="13" font-weight="bold" fill="white">AI Prompt</text>
  <text x="430" y="289" text-anchor="middle" font-size="10" fill="#c8d8ff">BC Context</text>

  <!-- Law 1: Kontext (top) -->
  <rect x="310" y="80" width="240" height="80" rx="10" fill="#1565c0"/>
  <text x="430" y="107" text-anchor="middle" font-size="14" font-weight="bold" fill="white">① Kontext</text>
  <text x="430" y="126" text-anchor="middle" font-size="10" fill="#cce4ff">Role + Prostředí + Verze</text>
  <text x="430" y="142" text-anchor="middle" font-size="10" fill="#cce4ff">"Jsem BC vývojář v BC v27, píšu AL..."</text>
  <!-- Arrow down -->
  <line x1="430" y1="160" x2="430" y2="205" stroke="#1565c0" stroke-width="2" marker-end="url(#pa)"/>

  <!-- Law 2: Specificity (left) -->
  <rect x="60" y="200" width="220" height="80" rx="10" fill="#2e7d32"/>
  <text x="170" y="227" text-anchor="middle" font-size="14" font-weight="bold" fill="white">② Specificity</text>
  <text x="170" y="246" text-anchor="middle" font-size="10" fill="#c8e8c8">Konkrétní vstup + výstup</text>
  <text x="170" y="262" text-anchor="middle" font-size="10" fill="#c8e8c8">Ne "pomoz mi", ale "vytvoř..."</text>
  <!-- Arrow right -->
  <line x1="280" y1="240" x2="370" y2="255" stroke="#2e7d32" stroke-width="2" marker-end="url(#pa)"/>

  <!-- Law 3: Iteration (right) -->
  <rect x="580" y="200" width="220" height="80" rx="10" fill="#e65100"/>
  <text x="690" y="227" text-anchor="middle" font-size="14" font-weight="bold" fill="white">③ Iteration</text>
  <text x="690" y="246" text-anchor="middle" font-size="10" fill="#ffe0d0">Upřesňuj, neopakuj</text>
  <text x="690" y="262" text-anchor="middle" font-size="10" fill="#ffe0d0">"Uprav to tak, aby..."</text>
  <!-- Arrow left -->
  <line x1="580" y1="255" x2="490" y2="260" stroke="#e65100" stroke-width="2" marker-end="url(#pa)"/>

  <!-- Law 4: Formát (bottom-left) -->
  <rect x="100" y="350" width="220" height="80" rx="10" fill="#4a148c"/>
  <text x="210" y="377" text-anchor="middle" font-size="14" font-weight="bold" fill="white">④ Output Format</text>
  <text x="210" y="396" text-anchor="middle" font-size="10" fill="#e0c8ff">Říct AI co chceš dostat</text>
  <text x="210" y="412" text-anchor="middle" font-size="10" fill="#e0c8ff">Tabulka / JSON / AL kód / text</text>
  <!-- Arrow up-right -->
  <line x1="320" y1="360" x2="390" y2="320" stroke="#4a148c" stroke-width="2" marker-end="url(#pa)"/>

  <!-- Law 5: Examples (bottom-right) -->
  <rect x="540" y="350" width="220" height="80" rx="10" fill="#880e4f"/>
  <text x="650" y="377" text-anchor="middle" font-size="14" font-weight="bold" fill="white">⑤ Examples (Few-shot)</text>
  <text x="650" y="396" text-anchor="middle" font-size="10" fill="#ffc8de">Ukázat vzor = lepší výsledek</text>
  <text x="650" y="412" text-anchor="middle" font-size="10" fill="#ffc8de">"Příklad vstupu → výstupu"</text>
  <!-- Arrow up-left -->
  <line x1="540" y1="360" x2="470" y2="320" stroke="#880e4f" stroke-width="2" marker-end="url(#pa)"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="pa" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#555"/>
    </marker>
  </defs>

  <!-- Quality indicator -->
  <rect x="30" y="450" width="800" height="22" rx="5" fill="#e3f2fd"/>
  <text x="430" y="465" text-anchor="middle" font-size="11" fill="#0052cc">Každý zákon přidává vrstvu přesnosti → kombinace všech pěti dává konzistentně kvalitní výsledky</text>
</svg>
