<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 480" font-family="Segoe UI, Arial, sans-serif">
  <rect width="860" height="480" fill="#f8f9fa" rx="12"/>

  <!-- Title -->
  <text x="430" y="34" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">AI Adoption in BC Practice — 90-Day Roadmap</text>
  <text x="430" y="52" text-anchor="middle" font-size="11" fill="#666">Three phases from first use to production deployment</text>

  <!-- Timeline bar -->
  <rect x="60" y="80" width="740" height="14" rx="7" fill="#e0e0e0"/>
  <rect x="60" y="80" width="246" height="14" rx="7" fill="#0052cc"/>
  <rect x="306" y="80" width="248" height="14" fill="#107c10"/>
  <rect x="554" y="80" width="246" height="14" rx="7" fill="#880e4f"/>
  <!-- Phase markers -->
  <circle cx="60" cy="87" r="8" fill="#0052cc"/>
  <circle cx="306" cy="87" r="8" fill="#107c10"/>
  <circle cx="554" cy="87" r="8" fill="#880e4f"/>
  <circle cx="800" cy="87" r="8" fill="#880e4f"/>
  <text x="60" y="110" text-anchor="middle" font-size="10" fill="#0052cc" font-weight="bold">Day 1</text>
  <text x="306" y="110" text-anchor="middle" font-size="10" fill="#107c10" font-weight="bold">Day 30</text>
  <text x="554" y="110" text-anchor="middle" font-size="10" fill="#880e4f" font-weight="bold">Day 60</text>
  <text x="800" y="110" text-anchor="middle" font-size="10" fill="#880e4f" font-weight="bold">Day 90</text>

  <!-- Phase labels -->
  <text x="183" y="76" text-anchor="middle" font-size="11" font-weight="bold" fill="#0052cc">PHASE 1: Foundations</text>
  <text x="430" y="76" text-anchor="middle" font-size="11" font-weight="bold" fill="#107c10">PHASE 2: Routine</text>
  <text x="677" y="76" text-anchor="middle" font-size="11" font-weight="bold" fill="#880e4f">PHASE 3: Deployment</text>

  <!-- Phase 1 box -->
  <rect x="40" y="125" width="246" height="320" rx="10" fill="white" stroke="#0052cc" stroke-width="2"/>
  <rect x="40" y="125" width="246" height="36" rx="10" fill="#0052cc"/>
  <rect x="40" y="145" width="246" height="16" fill="#0052cc"/>
  <text x="163" y="149" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Phase 1: Hands-on Basics</text>
  <text x="163" y="165" text-anchor="middle" font-size="10" fill="#cce4ff">Week 1–4</text>

  <text x="56" y="190" font-size="11" font-weight="bold" fill="#0052cc">✓ Install the tools</text>
  <text x="65" y="207" font-size="10" fill="#333">Claude Code, GitHub Copilot</text>
  <text x="56" y="228" font-size="11" font-weight="bold" fill="#0052cc">✓ First real task</text>
  <text x="65" y="245" font-size="10" fill="#333">Solve one actual bug</text>
  <text x="56" y="266" font-size="11" font-weight="bold" fill="#0052cc">✓ CLAUDE.md for project</text>
  <text x="65" y="283" font-size="10" fill="#333">Set up context for AI</text>
  <text x="56" y="304" font-size="11" font-weight="bold" fill="#0052cc">✓ Prompt templates</text>
  <text x="65" y="321" font-size="10" fill="#333">3 templates for recurring tasks</text>
  <text x="56" y="342" font-size="11" font-weight="bold" fill="#0052cc">✓ Measure time</text>
  <text x="65" y="359" font-size="10" fill="#333">Before/after comparison on 5 tasks</text>

  <rect x="56" y="395" width="214" height="38" rx="6" fill="#e8f0fe"/>
  <text x="163" y="411" text-anchor="middle" font-size="10" fill="#0052cc" font-weight="bold">Goal: Use AI every day</text>
  <text x="163" y="426" text-anchor="middle" font-size="10" fill="#0052cc">on at least 1 task</text>

  <!-- Phase 2 box -->
  <rect x="307" y="125" width="246" height="320" rx="10" fill="white" stroke="#107c10" stroke-width="2"/>
  <rect x="307" y="125" width="246" height="36" rx="10" fill="#107c10"/>
  <rect x="307" y="145" width="246" height="16" fill="#107c10"/>
  <text x="430" y="149" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Phase 2: Systematic Routine</text>
  <text x="430" y="165" text-anchor="middle" font-size="10" fill="#c8e8c8">Week 5–8</text>

  <text x="323" y="190" font-size="11" font-weight="bold" fill="#107c10">✓ Azure OpenAI setup</text>
  <text x="332" y="207" font-size="10" fill="#333">Resource, deployment, API key</text>
  <text x="323" y="228" font-size="11" font-weight="bold" fill="#107c10">✓ First AL integration</text>
  <text x="332" y="245" font-size="10" fill="#333">Categorization or summarization</text>
  <text x="323" y="266" font-size="11" font-weight="bold" fill="#107c10">✓ Colleague demo</text>
  <text x="332" y="283" font-size="10" fill="#333">Show 1 colleague, get feedback</text>
  <text x="323" y="304" font-size="11" font-weight="bold" fill="#107c10">✓ AI for consulting</text>
  <text x="332" y="321" font-size="10" fill="#333">Specs, tests, or documentation</text>
  <text x="323" y="342" font-size="11" font-weight="bold" fill="#107c10">✓ ROI calculation</text>
  <text x="332" y="359" font-size="10" fill="#333">Calculate saved hours</text>

  <rect x="323" y="395" width="214" height="38" rx="6" fill="#e8f5e9"/>
  <text x="430" y="411" text-anchor="middle" font-size="10" fill="#107c10" font-weight="bold">Goal: One AL function</text>
  <text x="430" y="426" text-anchor="middle" font-size="10" fill="#107c10">with AI in a production project</text>

  <!-- Phase 3 box -->
  <rect x="574" y="125" width="246" height="320" rx="10" fill="white" stroke="#880e4f" stroke-width="2"/>
  <rect x="574" y="125" width="246" height="36" rx="10" fill="#880e4f"/>
  <rect x="574" y="145" width="246" height="16" fill="#880e4f"/>
  <text x="697" y="149" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Phase 3: Production &amp; Sharing</text>
  <text x="697" y="165" text-anchor="middle" font-size="10" fill="#ffc8de">Week 9–13</text>

  <text x="590" y="190" font-size="11" font-weight="bold" fill="#880e4f">✓ Customer proposal</text>
  <text x="599" y="207" font-size="10" fill="#333">AI project with ROI for customer</text>
  <text x="590" y="228" font-size="11" font-weight="bold" fill="#880e4f">✓ Power Platform or MCP</text>
  <text x="599" y="245" font-size="10" fill="#333">Bot or advanced integration</text>
  <text x="590" y="266" font-size="11" font-weight="bold" fill="#880e4f">✓ Presentation to manager</text>
  <text x="599" y="283" font-size="10" fill="#333">Internal proposal for AI project</text>
  <text x="590" y="304" font-size="11" font-weight="bold" fill="#880e4f">✓ Share knowledge</text>
  <text x="599" y="321" font-size="10" fill="#333">LinkedIn post or internal workshop</text>
  <text x="590" y="342" font-size="11" font-weight="bold" fill="#880e4f">✓ Community</text>
  <text x="599" y="359" font-size="10" fill="#333">Get involved, ask, answer</text>

  <rect x="590" y="395" width="214" height="38" rx="6" fill="#fce4ec"/>
  <text x="697" y="411" text-anchor="middle" font-size="10" fill="#880e4f" font-weight="bold">Goal: AI = part of every</text>
  <text x="697" y="426" text-anchor="middle" font-size="10" fill="#880e4f">project and proposal</text>

  <!-- Bottom note -->
  <rect x="40" y="458" width="780" height="16" rx="4" fill="#fffde7"/>
  <text x="430" y="470" text-anchor="middle" font-size="10" fill="#666">This roadmap is a guide — adapt the pace to your project. Consistency matters more than speed.</text>
</svg>