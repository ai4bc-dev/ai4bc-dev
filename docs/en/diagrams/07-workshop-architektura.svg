<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Segoe UI, Arial, sans-serif">
  <rect width="900" height="480" fill="#f8f9fa" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">Architecture: Purchase Approval Extension</text>
  <text x="450" y="56" text-anchor="middle" font-size="12" fill="#666">Object schema and relationships in an AL extension</text>

  <!-- Table box -->
  <rect x="40" y="90" width="200" height="160" rx="8" fill="#fff" stroke="#0078d4" stroke-width="2"/>
  <rect x="40" y="90" width="200" height="32" rx="8" fill="#0078d4"/>
  <rect x="40" y="114" width="200" height="8" fill="#0078d4"/>
  <text x="140" y="112" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Table 50100</text>
  <text x="140" y="142" text-anchor="middle" font-size="11" fill="#1a1a2e" font-weight="bold">ZZ Purchase Approval Entry</text>
  <text x="55" y="165" font-size="10" fill="#555">Entry No. (PK, AutoIncr.)</text>
  <text x="55" y="180" font-size="10" fill="#555">Purchase Order No.</text>
  <text x="55" y="195" font-size="10" fill="#555">Status (Enum)</text>
  <text x="55" y="210" font-size="10" fill="#555">Approver User ID</text>
  <text x="55" y="225" font-size="10" fill="#555">Rejection Comment</text>
  <text x="55" y="240" font-size="10" fill="#555">Request/Decision DateTime</text>

  <!-- Enum box -->
  <rect x="40" y="280" width="200" height="100" rx="8" fill="#fff" stroke="#00b4d8" stroke-width="2"/>
  <rect x="40" y="280" width="200" height="32" rx="8" fill="#00b4d8"/>
  <rect x="40" y="304" width="200" height="8" fill="#00b4d8"/>
  <text x="140" y="302" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Enum 50100</text>
  <text x="140" y="332" text-anchor="middle" font-size="11" fill="#1a1a2e" font-weight="bold">ZZ Approval Status</text>
  <text x="55" y="355" font-size="10" fill="#555">Pending | Approved | Rejected</text>
  <text x="55" y="370" font-size="10" fill="#555">Extensible = true</text>

  <!-- Business logic codeunit -->
  <rect x="310" y="90" width="240" height="160" rx="8" fill="#fff" stroke="#0078d4" stroke-width="2"/>
  <rect x="310" y="90" width="240" height="32" rx="8" fill="#0078d4"/>
  <rect x="310" y="114" width="240" height="8" fill="#0078d4"/>
  <text x="430" y="112" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Codeunit 50100</text>
  <text x="430" y="142" text-anchor="middle" font-size="11" fill="#1a1a2e" font-weight="bold">ZZ Purchase Approval Mgmt</text>
  <text x="325" y="165" font-size="10" fill="#555">RequestApproval(PurchHeader)</text>
  <text x="325" y="180" font-size="10" fill="#555">  → checks limit 50,000 CZK</text>
  <text x="325" y="195" font-size="10" fill="#555">  → creates Entry record</text>
  <text x="325" y="210" font-size="10" fill="#555">ApproveOrder(EntryNo)</text>
  <text x="325" y="225" font-size="10" fill="#555">RejectOrder(EntryNo, Comment)</text>
  <text x="325" y="240" font-size="10" fill="#555">  → requires Comment</text>

  <!-- Email codeunit -->
  <rect x="310" y="280" width="240" height="100" rx="8" fill="#fff" stroke="#00b4d8" stroke-width="2"/>
  <rect x="310" y="280" width="240" height="32" rx="8" fill="#00b4d8"/>
  <rect x="310" y="304" width="240" height="8" fill="#00b4d8"/>
  <text x="430" y="302" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Codeunit 50101</text>
  <text x="430" y="332" text-anchor="middle" font-size="11" fill="#1a1a2e" font-weight="bold">ZZ Purchase Approval Email</text>
  <text x="325" y="355" font-size="10" fill="#555">SendApprovalRequest(Entry)</text>
  <text x="325" y="370" font-size="10" fill="#555">SendRejectionNotification(Entry)</text>

  <!-- Page -->
  <rect x="620" y="90" width="240" height="130" rx="8" fill="#fff" stroke="#4da6ff" stroke-width="2"/>
  <rect x="620" y="90" width="240" height="32" rx="8" fill="#4da6ff"/>
  <rect x="620" y="114" width="240" height="8" fill="#4da6ff"/>
  <text x="740" y="112" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Page 50100</text>
  <text x="740" y="142" text-anchor="middle" font-size="11" fill="#1a1a2e" font-weight="bold">ZZ Purchase Approval List</text>
  <text x="635" y="165" font-size="10" fill="#555">List of pending requests</text>
  <text x="635" y="180" font-size="10" fill="#555">Actions: Approve / Reject</text>
  <text x="635" y="195" font-size="10" fill="#555">Filter: Approver = CurrentUser</text>
  <text x="635" y="210" font-size="10" fill="#555">SourceTable: Approval Entry</text>

  <!-- BC Standard -->
  <rect x="620" y="260" width="240" height="80" rx="8" fill="#e8f4fd" stroke="#0078d4" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="740" y="290" text-anchor="middle" font-size="11" fill="#0078d4" font-weight="bold">BC Standard</text>
  <text x="740" y="310" text-anchor="middle" font-size="10" fill="#555">Purchase Header</text>
  <text x="740" y="325" text-anchor="middle" font-size="10" fill="#555">(no modification — linked via No.)</text>

  <!-- Arrows -->
  <!-- Table → Codeunit -->
  <line x1="240" y1="170" x2="310" y2="170" stroke="#0078d4" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <!-- Codeunit → Email -->
  <line x1="430" y1="250" x2="430" y2="280" stroke="#00b4d8" stroke-width="1.5" marker-end="url(#arrowCyan)"/>
  <!-- Page → Table -->
  <path d="M620,180 L570,180 L570,120 L240,120" fill="none" stroke="#4da6ff" stroke-width="1.5" marker-end="url(#arrowLight)"/>
  <!-- Table → BC Standard -->
  <path d="M240,200 L280,200 L280,300 L620,300" fill="none" stroke="#0078d4" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- Enum → Table -->
  <line x1="140" y1="280" x2="140" y2="250" stroke="#00b4d8" stroke-width="1.5" marker-end="url(#arrowCyan)"/>

  <!-- Legend -->
  <rect x="40" y="420" width="820" height="45" rx="6" fill="#f0f4f8"/>
  <circle cx="70" cy="442" r="6" fill="#0078d4"/>
  <text x="85" y="447" font-size="10" fill="#555">Business Logic</text>
  <circle cx="210" cy="442" r="6" fill="#00b4d8"/>
  <text x="225" y="447" font-size="10" fill="#555">Email Notification</text>
  <circle cx="370" cy="442" r="6" fill="#4da6ff"/>
  <text x="385" y="447" font-size="10" fill="#555">UI (Page)</text>
  <rect x="500" y="436" width="30" height="12" rx="2" fill="none" stroke="#0078d4" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="540" y="447" font-size="10" fill="#555">Relation to BC standard (no modification)</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#0078d4"/>
    </marker>
    <marker id="arrowCyan" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00b4d8"/>
    </marker>
    <marker id="arrowLight" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4da6ff"/>
    </marker>
  </defs>
</svg>