<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Segoe UI, Arial, sans-serif">
  <rect width="900" height="500" fill="#f8f9fa" rx="12"/>

  <text x="450" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">Decision Tree: Fine-tuning vs. RAG vs. Prompt Engineering</text>
  <text x="450" y="56" text-anchor="middle" font-size="12" fill="#666">How to choose the right approach for your BC AI project</text>

  <!-- Root question -->
  <polygon points="450,80 560,120 450,160 340,120" fill="#0078d4" stroke="#0056a0" stroke-width="1"/>
  <text x="450" y="118" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">What do you need from AI?</text>
  <text x="450" y="133" text-anchor="middle" font-size="10" fill="#e0e8f0">Facts or style?</text>

  <!-- Left branch: FACTS -->
  <line x1="340" y1="120" x2="200" y2="190" stroke="#0078d4" stroke-width="2"/>
  <text x="255" y="160" font-size="10" fill="#0078d4" font-weight="bold">FACTS</text>
  <text x="255" y="172" font-size="9" fill="#555">customers, prices, data</text>

  <!-- Right branch: STYLE -->
  <line x1="560" y1="120" x2="700" y2="190" stroke="#00b4d8" stroke-width="2"/>
  <text x="635" y="160" font-size="10" fill="#00b4d8" font-weight="bold">STYLE</text>
  <text x="635" y="172" font-size="9" fill="#555">tone, format, terminology</text>

  <!-- Left: Data changing? -->
  <polygon points="200,190 290,220 200,250 110,220" fill="#0078d4" opacity="0.8"/>
  <text x="200" y="218" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">Data changing?</text>
  <text x="200" y="232" text-anchor="middle" font-size="9" fill="#e0e8f0">Dynamic?</text>

  <!-- Left-Left: Yes, data changes -->
  <line x1="110" y1="220" x2="60" y2="280" stroke="#0078d4" stroke-width="1.5"/>
  <text x="70" y="265" font-size="9" fill="#0078d4" font-weight="bold">YES</text>

  <!-- API/RAG choice -->
  <polygon points="80,280 150,305 80,330 10,305" fill="#0078d4" opacity="0.6"/>
  <text x="80" y="303" text-anchor="middle" font-size="9" font-weight="bold" fill="#fff">Real-time?</text>

  <!-- Real-time: API -->
  <line x1="10" y1="305" x2="10" y2="360" stroke="#0078d4" stroke-width="1.5"/>
  <text x="10" y="347" font-size="9" fill="#0078d4">YES</text>
  <rect x="-40" y="360" width="100" height="50" rx="6" fill="#27ae60"/>
  <text x="10" y="382" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">BC API</text>
  <text x="10" y="398" text-anchor="middle" font-size="9" fill="#e8f8e8">HttpClient calls</text>

  <!-- Not real-time: RAG -->
  <line x1="150" y1="305" x2="150" y2="360" stroke="#0078d4" stroke-width="1.5"/>
  <text x="150" y="347" font-size="9" fill="#0078d4">NO</text>
  <rect x="100" y="360" width="100" height="50" rx="6" fill="#e67e22"/>
  <text x="150" y="382" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">RAG</text>
  <text x="150" y="398" text-anchor="middle" font-size="9" fill="#fef3e8">Vector search</text>

  <!-- Left-Right: No, data stable -->
  <line x1="290" y1="220" x2="340" y2="280" stroke="#0078d4" stroke-width="1.5"/>
  <text x="320" y="265" font-size="9" fill="#0078d4" font-weight="bold">NO</text>

  <!-- How much data? -->
  <polygon points="340,280 410,305 340,330 270,305" fill="#0078d4" opacity="0.6"/>
  <text x="340" y="303" text-anchor="middle" font-size="9" font-weight="bold" fill="#fff">How much data?</text>

  <!-- < 20 pages: Prompt -->
  <line x1="270" y1="305" x2="250" y2="360" stroke="#0078d4" stroke-width="1.5"/>
  <text x="250" y="347" font-size="9" fill="#0078d4">&lt;20 pages</text>
  <rect x="200" y="360" width="100" height="50" rx="6" fill="#9b59b6"/>
  <text x="250" y="382" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">Prompt</text>
  <text x="250" y="398" text-anchor="middle" font-size="9" fill="#f0e8f8">System prompt</text>

  <!-- > 20 pages: RAG -->
  <line x1="410" y1="305" x2="410" y2="360" stroke="#0078d4" stroke-width="1.5"/>
  <text x="410" y="347" font-size="9" fill="#0078d4">&gt;20 pages</text>
  <rect x="360" y="360" width="100" height="50" rx="6" fill="#e67e22"/>
  <text x="410" y="382" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">RAG</text>
  <text x="410" y="398" text-anchor="middle" font-size="9" fill="#fef3e8">Vector search</text>

  <!-- Right: Style branch -->
  <polygon points="700,190 790,220 700,250 610,220" fill="#00b4d8" opacity="0.8"/>
  <text x="700" y="218" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">Prompt enough?</text>
  <text x="700" y="232" text-anchor="middle" font-size="9" fill="#e0e8f0">Few-shot examples?</text>

  <!-- Yes: Prompt engineering -->
  <line x1="610" y1="220" x2="560" y2="280" stroke="#00b4d8" stroke-width="1.5"/>
  <text x="575" y="265" font-size="9" fill="#00b4d8" font-weight="bold">YES</text>
  <rect x="510" y="280" width="110" height="50" rx="6" fill="#9b59b6"/>
  <text x="565" y="302" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">Prompt Eng.</text>
  <text x="565" y="318" text-anchor="middle" font-size="9" fill="#f0e8f8">System prompt +</text>
  <text x="565" y="330" text-anchor="middle" font-size="9" fill="#f0e8f8">few-shot examples</text>

  <!-- No: Fine-tuning -->
  <line x1="790" y1="220" x2="840" y2="280" stroke="#00b4d8" stroke-width="1.5"/>
  <text x="820" y="265" font-size="9" fill="#00b4d8" font-weight="bold">NO</text>

  <!-- Fine-tuning prerequisites -->
  <polygon points="840,280 890,305 840,330 790,305" fill="#00b4d8" opacity="0.6"/>
  <text x="840" y="303" text-anchor="middle" font-size="9" font-weight="bold" fill="#fff">100+ examples?</text>

  <line x1="790" y1="305" x2="730" y2="360" stroke="#00b4d8" stroke-width="1.5"/>
  <text x="750" y="347" font-size="9" fill="#e74c3c">NO</text>
  <rect x="680" y="360" width="100" height="50" rx="6" fill="#9b59b6"/>
  <text x="730" y="382" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">Prompt Eng.</text>
  <text x="730" y="398" text-anchor="middle" font-size="9" fill="#f0e8f8">More examples in prompt</text>

  <line x1="890" y1="305" x2="890" y2="360" stroke="#00b4d8" stroke-width="1.5"/>
  <text x="890" y="347" font-size="9" fill="#27ae60">YES</text>
  <rect x="840" y="360" width="100" height="50" rx="6" fill="#e74c3c"/>
  <text x="890" y="382" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">Fine-tuning</text>
  <text x="890" y="398" text-anchor="middle" font-size="9" fill="#fce8e8">Last resort</text>

  <!-- Legend -->
  <rect x="30" y="440" width="840" height="45" rx="6" fill="#f0f4f8"/>
  <rect x="55" y="455" width="16" height="16" rx="3" fill="#27ae60"/>
  <text x="80" y="467" font-size="10" fill="#555">BC API (real-time data)</text>
  <rect x="225" y="455" width="16" height="16" rx="3" fill="#e67e22"/>
  <text x="250" y="467" font-size="10" fill="#555">RAG (static/changing data)</text>
  <rect x="425" y="455" width="16" height="16" rx="3" fill="#9b59b6"/>
  <text x="450" y="467" font-size="10" fill="#555">Prompt Engineering (most cases)</text>
  <rect x="665" y="455" width="16" height="16" rx="3" fill="#e74c3c"/>
  <text x="690" y="467" font-size="10" fill="#555">Fine-tuning (last resort, 1% of projects)</text>
</svg>