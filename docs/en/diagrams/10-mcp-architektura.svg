<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="Segoe UI, Arial, sans-serif">
  <rect width="900" height="400" fill="#f8f9fa" rx="12"/>

  <text x="450" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">MCP Architektura: AI asistent ↔ Business Central</text>
  <text x="450" y="56" text-anchor="middle" font-size="12" fill="#666">Model Context Protocol — standardní rozhraní pro AI-BC komunikaci</text>

  <!-- AI Client (left) -->
  <rect x="30" y="100" width="200" height="220" rx="10" fill="#0a1628"/>
  <text x="130" y="130" text-anchor="middle" font-size="14" font-weight="bold" fill="#00b4d8">AI Klient</text>
  <line x1="50" y1="140" x2="210" y2="140" stroke="#00b4d8" stroke-width="0.5" opacity="0.4"/>

  <rect x="50" y="155" width="160" height="30" rx="4" fill="#0078d4" opacity="0.3" stroke="#0078d4" stroke-width="1"/>
  <text x="130" y="175" text-anchor="middle" font-size="10" fill="#a0c4ff">Claude Code</text>

  <rect x="50" y="195" width="160" height="30" rx="4" fill="#0078d4" opacity="0.2" stroke="#0078d4" stroke-width="1"/>
  <text x="130" y="215" text-anchor="middle" font-size="10" fill="#a0c4ff">Claude Desktop</text>

  <rect x="50" y="235" width="160" height="30" rx="4" fill="#0078d4" opacity="0.1" stroke="#0078d4" stroke-width="1"/>
  <text x="130" y="255" text-anchor="middle" font-size="10" fill="#a0c4ff">Jiný MCP klient</text>

  <text x="130" y="295" text-anchor="middle" font-size="9" fill="#666">Uživatel ptá:</text>
  <text x="130" y="310" text-anchor="middle" font-size="10" fill="#00b4d8" font-style="italic">"Jaký je kredit C10000?"</text>

  <!-- MCP Protocol (middle) -->
  <rect x="280" y="100" width="340" height="220" rx="10" fill="#fff" stroke="#0078d4" stroke-width="2"/>
  <text x="450" y="125" text-anchor="middle" font-size="13" font-weight="bold" fill="#0078d4">MCP Server (Node.js/Python)</text>
  <line x1="300" y1="135" x2="600" y2="135" stroke="#0078d4" stroke-width="0.5"/>

  <!-- Tools list -->
  <text x="310" y="158" font-size="11" fill="#1a1a2e" font-weight="bold">Registrované nástroje:</text>

  <rect x="310" y="168" width="290" height="28" rx="4" fill="#e8f4fd"/>
  <text x="320" y="187" font-size="10" fill="#0078d4" font-weight="bold">get_customer</text>
  <text x="445" y="187" font-size="9" fill="#555">→ info o zákazníkovi (jméno, kredit, adresa)</text>

  <rect x="310" y="202" width="290" height="28" rx="4" fill="#f0f4f8"/>
  <text x="320" y="221" font-size="10" fill="#0078d4" font-weight="bold">list_open_sales_orders</text>
  <text x="490" y="221" font-size="9" fill="#555">→ otevřené objednávky</text>

  <rect x="310" y="236" width="290" height="28" rx="4" fill="#e8f4fd"/>
  <text x="320" y="255" font-size="10" fill="#0078d4" font-weight="bold">get_item_inventory</text>
  <text x="470" y="255" font-size="9" fill="#555">→ stav skladu položky</text>

  <!-- Auth section -->
  <rect x="310" y="275" width="290" height="35" rx="4" fill="#fff3e0" stroke="#e67e22" stroke-width="1"/>
  <text x="320" y="294" font-size="10" fill="#e67e22" font-weight="bold">🔒 OAuth2:</text>
  <text x="385" y="294" font-size="9" fill="#555">Azure AD → Bearer Token → BC API</text>

  <!-- BC (right) -->
  <rect x="670" y="100" width="200" height="220" rx="10" fill="#fff" stroke="#0078d4" stroke-width="2"/>
  <rect x="670" y="100" width="200" height="35" rx="10" fill="#0078d4"/>
  <rect x="670" y="127" width="200" height="8" fill="#0078d4"/>
  <text x="770" y="123" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Business Central</text>

  <text x="690" y="160" font-size="10" fill="#555">OData API v2.0</text>
  <text x="690" y="180" font-size="10" fill="#555">/customers</text>
  <text x="690" y="198" font-size="10" fill="#555">/salesOrders</text>
  <text x="690" y="216" font-size="10" fill="#555">/items</text>
  <text x="690" y="234" font-size="10" fill="#555">/vendors</text>
  <text x="690" y="252" font-size="10" fill="#555">/purchaseInvoices</text>

  <rect x="685" y="270" width="170" height="35" rx="4" fill="#e8f4fd"/>
  <text x="770" y="292" text-anchor="middle" font-size="9" fill="#0078d4">Reálná data v reálném čase</text>

  <!-- Arrows -->
  <!-- AI Client → MCP -->
  <line x1="230" y1="200" x2="280" y2="200" stroke="#00b4d8" stroke-width="2.5" marker-end="url(#arrC)"/>
  <line x1="280" y1="220" x2="230" y2="220" stroke="#0078d4" stroke-width="2.5" marker-end="url(#arrB)"/>
  <text x="255" y="195" text-anchor="middle" font-size="8" fill="#00b4d8">dotaz</text>
  <text x="255" y="235" text-anchor="middle" font-size="8" fill="#0078d4">odpověď</text>

  <!-- MCP → BC -->
  <line x1="620" y1="200" x2="670" y2="200" stroke="#0078d4" stroke-width="2.5" marker-end="url(#arrB)"/>
  <line x1="670" y1="220" x2="620" y2="220" stroke="#0078d4" stroke-width="2.5" marker-end="url(#arrB2)"/>
  <text x="645" y="195" text-anchor="middle" font-size="8" fill="#0078d4">REST</text>
  <text x="645" y="235" text-anchor="middle" font-size="8" fill="#0078d4">JSON</text>

  <!-- Bottom note -->
  <rect x="30" y="345" width="840" height="40" rx="6" fill="#f0f4f8"/>
  <text x="450" y="365" text-anchor="middle" font-size="11" fill="#555">MCP server napíšete jednou → funguje s libovolným MCP-kompatibilním AI klientem</text>
  <text x="450" y="380" text-anchor="middle" font-size="10" fill="#0078d4" font-weight="bold">"USB standard pro AI integrace"</text>

  <defs>
    <marker id="arrB" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#0078d4"/>
    </marker>
    <marker id="arrB2" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#0078d4"/>
    </marker>
    <marker id="arrC" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00b4d8"/>
    </marker>
  </defs>
</svg>
