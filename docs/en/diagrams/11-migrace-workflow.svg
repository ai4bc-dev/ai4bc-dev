<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="Segoe UI, Arial, sans-serif">
  <rect width="900" height="340" fill="#f8f9fa" rx="12"/>

  <text x="450" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">AI-asistovaná migrace dat do Business Central</text>
  <text x="450" y="50" text-anchor="middle" font-size="12" fill="#666">5 kroků od zdrojových dat k čistým BC záznamům</text>

  <!-- Step 1 -->
  <rect x="30" y="80" width="150" height="100" rx="8" fill="#0078d4"/>
  <text x="105" y="108" text-anchor="middle" font-size="24" fill="#fff" opacity="0.3">1</text>
  <text x="105" y="130" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Zdrojová data</text>
  <text x="105" y="148" text-anchor="middle" font-size="10" fill="#e0e8f0">Excel, CSV, starý ERP</text>
  <text x="105" y="163" text-anchor="middle" font-size="10" fill="#e0e8f0">NAV, jiný systém</text>

  <line x1="180" y1="130" x2="210" y2="130" stroke="#0078d4" stroke-width="2" marker-end="url(#mArr)"/>

  <!-- Step 2 -->
  <rect x="210" y="80" width="150" height="100" rx="8" fill="#fff" stroke="#00b4d8" stroke-width="2"/>
  <text x="285" y="108" text-anchor="middle" font-size="24" fill="#00b4d8" opacity="0.3">2</text>
  <text x="285" y="128" text-anchor="middle" font-size="12" font-weight="bold" fill="#00b4d8">AI: Mapování</text>
  <text x="285" y="146" text-anchor="middle" font-size="10" fill="#555">Zdrojový sloupec</text>
  <text x="285" y="159" text-anchor="middle" font-size="10" fill="#555">→ BC pole</text>
  <text x="285" y="172" text-anchor="middle" font-size="9" fill="#888">2 min místo 1 hodiny</text>

  <line x1="360" y1="130" x2="390" y2="130" stroke="#00b4d8" stroke-width="2" marker-end="url(#mArr2)"/>

  <!-- Step 3 -->
  <rect x="390" y="80" width="150" height="100" rx="8" fill="#fff" stroke="#e67e22" stroke-width="2"/>
  <text x="465" y="108" text-anchor="middle" font-size="24" fill="#e67e22" opacity="0.3">3</text>
  <text x="465" y="128" text-anchor="middle" font-size="12" font-weight="bold" fill="#e67e22">AI: Čištění</text>
  <text x="465" y="146" text-anchor="middle" font-size="10" fill="#555">Adresy, duplicity</text>
  <text x="465" y="159" text-anchor="middle" font-size="10" fill="#555">DIČ, kategorie</text>
  <text x="465" y="172" text-anchor="middle" font-size="9" fill="#888">3h místo 3 dnů</text>

  <line x1="540" y1="130" x2="570" y2="130" stroke="#e67e22" stroke-width="2" marker-end="url(#mArr3)"/>

  <!-- Step 4 -->
  <rect x="570" y="80" width="150" height="100" rx="8" fill="#fff" stroke="#27ae60" stroke-width="2"/>
  <text x="645" y="108" text-anchor="middle" font-size="24" fill="#27ae60" opacity="0.3">4</text>
  <text x="645" y="128" text-anchor="middle" font-size="12" font-weight="bold" fill="#27ae60">Import do BC</text>
  <text x="645" y="146" text-anchor="middle" font-size="10" fill="#555">RapidStart nebo</text>
  <text x="645" y="159" text-anchor="middle" font-size="10" fill="#555">Configuration Package</text>

  <line x1="720" y1="130" x2="750" y2="130" stroke="#27ae60" stroke-width="2" marker-end="url(#mArr4)"/>

  <!-- Step 5 -->
  <rect x="750" y="80" width="120" height="100" rx="8" fill="#fff" stroke="#9b59b6" stroke-width="2"/>
  <text x="810" y="108" text-anchor="middle" font-size="24" fill="#9b59b6" opacity="0.3">5</text>
  <text x="810" y="128" text-anchor="middle" font-size="12" font-weight="bold" fill="#9b59b6">AI: Validace</text>
  <text x="810" y="146" text-anchor="middle" font-size="10" fill="#555">SQL diagnostika</text>
  <text x="810" y="159" text-anchor="middle" font-size="10" fill="#555">Integritní kontroly</text>

  <!-- AI badge on steps 2, 3, 5 -->
  <rect x="220" y="73" width="28" height="16" rx="3" fill="#0a1628"/>
  <text x="234" y="85" text-anchor="middle" font-size="8" fill="#00b4d8" font-weight="bold">AI</text>
  <rect x="400" y="73" width="28" height="16" rx="3" fill="#0a1628"/>
  <text x="414" y="85" text-anchor="middle" font-size="8" fill="#00b4d8" font-weight="bold">AI</text>
  <rect x="760" y="73" width="28" height="16" rx="3" fill="#0a1628"/>
  <text x="774" y="85" text-anchor="middle" font-size="8" fill="#00b4d8" font-weight="bold">AI</text>

  <!-- Timeline comparison bar -->
  <text x="450" y="220" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">Porovnání: migrace 1 500 zákazníků + 8 000 položek</text>

  <!-- Without AI -->
  <rect x="100" y="240" width="700" height="25" rx="4" fill="#e74c3c" opacity="0.2"/>
  <rect x="100" y="240" width="700" height="25" rx="4" fill="#e74c3c" opacity="0.8"/>
  <text x="450" y="258" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Bez AI: 3 týdny</text>
  <text x="60" y="258" font-size="10" fill="#555">Ruční:</text>

  <!-- With AI -->
  <rect x="100" y="275" width="100" height="25" rx="4" fill="#27ae60"/>
  <text x="150" y="293" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">S AI: 3 dny</text>
  <text x="60" y="293" font-size="10" fill="#555">AI:</text>

  <!-- Savings label -->
  <text x="250" y="293" font-size="11" fill="#27ae60" font-weight="bold">→ 10× rychlejší</text>

  <defs>
    <marker id="mArr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#0078d4"/>
    </marker>
    <marker id="mArr2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00b4d8"/>
    </marker>
    <marker id="mArr3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#e67e22"/>
    </marker>
    <marker id="mArr4" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#27ae60"/>
    </marker>
  </defs>
</svg>
